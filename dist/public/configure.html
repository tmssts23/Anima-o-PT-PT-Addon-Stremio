<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configurar Addon Kids</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 32px auto; padding: 0 16px; }
    code { background: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Filmes e Series de Animacao PT-PT</h1>
  <p>Usa este URL no Stremio:</p>
  <p><code id="m"></code></p>
  <p>Este addon usa apenas os catalogos de Filmes e Series. O separador de novelas foi removido.</p>
  <script>
    document.getElementById('m').textContent = location.origin + '/manifest.json';
  </script>
</body>
</html>
